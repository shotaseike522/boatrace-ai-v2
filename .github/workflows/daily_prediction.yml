name: 競艇AI予想 日次バッチ

on:
  workflow_dispatch:
    # GAS (Google Apps Script) からの手動トリガー、および
    # GitHub画面からの「Run workflow」ボタンによる手動実行用

# 💡 同じ処理が重複して走らないようにする（前回の処理が終わるまで次を待つ）
concurrency:
  group: boatrace-daily-prediction
  cancel-in-progress: false

jobs:
  run-daily:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト（LFSファイルも取得）
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Python環境をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存パッケージをインストール
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 日次バッチ実行（出走表取得 -> AI予測 -> 選手マスタ更新）
        run: python daily_prep.py

      - name: 結果をコミット＆プッシュ
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ outputs/ racer_master.csv
          git commit -m "🤖 日次自動更新: 出走表・AI予測・選手マスタ ($(date -u +'%Y-%m-%d %H:%M UTC'))" || echo "変更なし（コミットをスキップ）"
          git pull --rebase origin main
          git push
